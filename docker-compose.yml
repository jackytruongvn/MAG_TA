services:
  # One-off init: creates the SQLite schema and seeds default config, then
  # exits. Uses the `builder` stage because it has the full devDependencies
  # (prisma CLI, tsx) that the slim `runner` image deliberately excludes.
  # Safe to run on every `up` — both db push and the seed script are idempotent.
  migrate:
    build:
      context: .
      target: builder
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - db-data:/app/data
    entrypoint: ["sh", "-c"]
    # migrate runs as root (the `builder` stage has no USER directive), so the
    # SQLite file it creates is root-owned. `app` runs as the non-root `nextjs`
    # user (uid/gid 1001, see the `runner` stage) and would otherwise fail with
    # "attempt to write a readonly database" — chown the volume to match before exiting.
    command: ["npx prisma db push --skip-generate && npm run db:seed && chown -R 1001:1001 /app/data"]

  app:
    build:
      context: .
      target: runner
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Overrides the .env value so the SQLite file lives on a persisted
      # volume instead of the container's ephemeral filesystem.
      - DATABASE_URL=file:/app/data/dev.db
      - PORT=3001
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
